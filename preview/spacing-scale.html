<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="eyebrow">Spacing — 8-pt + 4-pt half-step</div>
  <div class="col" style="gap:6px;">
    <div class="row"><div class="label-mono" style="width:40px;color:var(--fg-1)">s-1</div><div class="label-mono" style="width:50px;">4</div><div style="height:14px;background:var(--accent);width:4px;"></div></div>
    <div class="row"><div class="label-mono" style="width:40px;color:var(--fg-1)">s-2</div><div class="label-mono" style="width:50px;">8</div><div style="height:14px;background:var(--accent);width:8px;"></div></div>
    <div class="row"><div class="label-mono" style="width:40px;color:var(--fg-1)">s-3</div><div class="label-mono" style="width:50px;">12</div><div style="height:14px;background:var(--accent);width:12px;"></div></div>
    <div class="row"><div class="label-mono" style="width:40px;color:var(--fg-1)">s-4</div><div class="label-mono" style="width:50px;">16</div><div style="height:14px;background:var(--accent);width:16px;"></div></div>
    <div class="row"><div class="label-mono" style="width:40px;color:var(--fg-1)">s-5</div><div class="label-mono" style="width:50px;">24</div><div style="height:14px;background:var(--accent);width:24px;"></div></div>
    <div class="row"><div class="label-mono" style="width:40px;color:var(--fg-1)">s-6</div><div class="label-mono" style="width:50px;">32</div><div style="height:14px;background:var(--accent);width:32px;"></div></div>
    <div class="row"><div class="label-mono" style="width:40px;color:var(--fg-1)">s-7</div><div class="label-mono" style="width:50px;">48</div><div style="height:14px;background:var(--accent);width:48px;"></div></div>
    <div class="row"><div class="label-mono" style="width:40px;color:var(--fg-1)">s-8</div><div class="label-mono" style="width:50px;">64</div><div style="height:14px;background:var(--accent);width:64px;"></div></div>
    <div class="row"><div class="label-mono" style="width:40px;color:var(--fg-1)">s-9</div><div class="label-mono" style="width:50px;">96</div><div style="height:14px;background:var(--accent);width:96px;"></div></div>
    <div class="row"><div class="label-mono" style="width:40px;color:var(--fg-1)">s-10</div><div class="label-mono" style="width:50px;">128</div><div style="height:14px;background:var(--accent);width:128px;"></div></div>
  </div>
</div></body></html>
