<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Motion</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="eyebrow">Motion — confident, no bounce</div>
  <div class="col" style="gap:10px;">
    <div class="row" style="justify-content:space-between;border-bottom:1px solid var(--border);padding-bottom:8px;">
      <div class="label-mono" style="color:var(--fg-1)">--ease</div>
      <div class="label-mono">cubic-bezier(0.2, 0.7, 0.2, 1)</div>
    </div>
    <div class="row" style="justify-content:space-between;border-bottom:1px solid var(--border);padding-bottom:8px;">
      <div class="label-mono" style="color:var(--fg-1)">--motion-fast</div>
      <div class="label-mono">120ms · hover, focus</div>
    </div>
    <div class="row" style="justify-content:space-between;border-bottom:1px solid var(--border);padding-bottom:8px;">
      <div class="label-mono" style="color:var(--fg-1)">--motion</div>
      <div class="label-mono">220ms · UI transitions</div>
    </div>
    <div class="row" style="justify-content:space-between;border-bottom:1px solid var(--border);padding-bottom:8px;">
      <div class="label-mono" style="color:var(--fg-1)">--motion-slow</div>
      <div class="label-mono">480ms · entrances</div>
    </div>
    <div style="font-family:var(--font-sans);font-size:13px;line-height:20px;color:var(--fg-3);margin-top:4px;">No bounces, no springs, no parallax. Entrance: 12px translateY + opacity, staggered 60ms.</div>
  </div>
</div></body></html>
