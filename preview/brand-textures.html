<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Brand · Textures</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="eyebrow">Texture artwork — one per project, screen-blend low-opacity</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;">
    <div class="col">
      <div style="aspect-ratio:3/4;background:url('../assets/texture-cyan.jpg') center/cover;border-radius:8px;border:1px solid var(--border);"></div>
      <div class="label-mono" style="color:var(--fg-1)">cyan</div>
      <div class="label-mono">PULSAR</div>
    </div>
    <div class="col">
      <div style="aspect-ratio:3/4;background:url('../assets/texture-teal.jpg') center/cover;border-radius:8px;border:1px solid var(--border);"></div>
      <div class="label-mono" style="color:var(--fg-1)">teal</div>
      <div class="label-mono">Biquettes</div>
    </div>
    <div class="col">
      <div style="aspect-ratio:3/4;background:url('../assets/texture-violet.jpg') center/cover;border-radius:8px;border:1px solid var(--border);"></div>
      <div class="label-mono" style="color:var(--fg-1)">violet</div>
      <div class="label-mono">Brooklyn</div>
    </div>
    <div class="col">
      <div style="aspect-ratio:3/4;background:url('../assets/texture-amber.jpg') center/cover;border-radius:8px;border:1px solid var(--border);"></div>
      <div class="label-mono" style="color:var(--fg-1)">amber</div>
      <div class="label-mono">BABYCAM, Sleep</div>
    </div>
  </div>
  <div class="label-mono" style="color:var(--fg-3);">Always darkened (multiply 0.55) on project cards so the title remains readable.</div>
</div></body></html>
