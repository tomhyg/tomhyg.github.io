<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="_card.css">
<style>
  .btn{font-family:var(--font-sans);font-size:14px;font-weight:500;line-height:1;border-radius:8px;padding:11px 18px;border:1px solid transparent;cursor:pointer;transition:all 120ms cubic-bezier(0.2,0.7,0.2,1);display:inline-flex;align-items:center;gap:8px;}
  .btn-primary{background:var(--fg-1);color:var(--bg-0);}
  .btn-primary:hover{background:#fff;}
  .btn-secondary{background:transparent;color:var(--fg-1);border-color:var(--border-strong);}
  .btn-secondary:hover{background:var(--bg-2);border-color:var(--fg-3);}
  .btn-ghost{background:transparent;color:var(--fg-2);}
  .btn-ghost:hover{color:var(--fg-1);}
  .btn-accent{background:var(--accent);color:#fff;}
  .btn-accent:hover{background:var(--accent-soft);}
</style></head>
<body><div class="card">
  <div class="eyebrow">Buttons</div>
  <div class="row" style="gap:10px;flex-wrap:wrap;">
    <button class="btn btn-primary">Get in touch</button>
    <button class="btn btn-secondary">Download CV</button>
    <button class="btn btn-ghost">View project →</button>
    <button class="btn btn-accent">Featured</button>
  </div>
  <div class="label-mono">primary · secondary · ghost · accent — height 38, r-2, 11px y-pad</div>
</div></body></html>
