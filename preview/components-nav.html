<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Nav</title>
<link rel="stylesheet" href="_card.css">
<style>
  .nav{display:flex;align-items:center;gap:24px;padding:14px 20px;background:rgba(7,7,11,0.72);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:14px;}
  .brand{display:flex;align-items:center;gap:10px;font-family:var(--font-sans);font-weight:600;color:var(--fg-1);font-size:15px;letter-spacing:-0.01em;}
  .brand .cursor{width:8px;height:8px;background:var(--accent);}
  .nav a{font-family:var(--font-sans);font-size:13px;color:var(--fg-2);font-weight:500;}
  .nav a:hover{color:var(--fg-1);}
  .nav-spacer{flex:1;}
  .lang{display:flex;align-items:center;gap:0;font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
  .lang span{padding:5px 9px;color:var(--fg-3);}
  .lang span.active{background:var(--bg-2);color:var(--fg-1);}
</style></head>
<body><div class="card">
  <div class="eyebrow">Nav · sticky-top · bg blur on scroll</div>
  <div class="nav">
    <div class="brand"><div class="cursor"></div>Tom Huyghe</div>
    <a href="#">Work</a>
    <a href="#">Skills</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
    <div class="nav-spacer"></div>
    <div class="lang"><span class="active">EN</span><span>FR</span></div>
  </div>
  <div class="label-mono">brand · 4 links · spacer · language toggle (text, never flag emoji)</div>
</div></body></html>
