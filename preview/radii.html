<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="eyebrow">Radii — restrained, never larger than r-4</div>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;">
    <div class="col"><div style="height:64px;background:var(--bg-1);border:1px solid var(--border);border-radius:4px;"></div><div class="label-mono" style="color:var(--fg-1)">r-1 · 4</div><div class="label-mono">inputs, chips</div></div>
    <div class="col"><div style="height:64px;background:var(--bg-1);border:1px solid var(--border);border-radius:8px;"></div><div class="label-mono" style="color:var(--fg-1)">r-2 · 8</div><div class="label-mono">buttons</div></div>
    <div class="col"><div style="height:64px;background:var(--bg-1);border:1px solid var(--border);border-radius:12px;"></div><div class="label-mono" style="color:var(--fg-1)">r-3 · 12</div><div class="label-mono">project cards</div></div>
    <div class="col"><div style="height:64px;background:var(--bg-1);border:1px solid var(--border);border-radius:20px;"></div><div class="label-mono" style="color:var(--fg-1)">r-4 · 20</div><div class="label-mono">portrait, hero</div></div>
    <div class="col"><div style="height:64px;background:var(--bg-1);border:1px solid var(--border);border-radius:999px;"></div><div class="label-mono" style="color:var(--fg-1)">r-pill</div><div class="label-mono">tag chips only</div></div>
  </div>
</div></body></html>
