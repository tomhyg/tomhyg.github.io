<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Color · Accent</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="eyebrow">Color · Violet electric accent</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">
    <div class="col">
      <div style="height:80px;border-radius:8px;background:var(--accent-deep);"></div>
      <div class="label-mono" style="color:var(--fg-1)">accent-deep</div>
      <div class="label-mono">#5538DB</div>
      <div class="label-mono">pressed</div>
    </div>
    <div class="col">
      <div style="height:80px;border-radius:8px;background:var(--accent);"></div>
      <div class="label-mono" style="color:var(--fg-1)">accent</div>
      <div class="label-mono">#7C5CFF</div>
      <div class="label-mono">focus, single moment</div>
    </div>
    <div class="col">
      <div style="height:80px;border-radius:8px;background:var(--accent-soft);"></div>
      <div class="label-mono" style="color:var(--fg-1)">accent-soft</div>
      <div class="label-mono">#B794FF</div>
      <div class="label-mono">hover-glow</div>
    </div>
  </div>
  <div class="t-body-sm" style="color:var(--fg-3);font-family:var(--font-sans);font-size:13px;">Used for one thing per view: a hero word, a focus ring, a single hover. Never as a fill on big surfaces.</div>
</div></body></html>
