<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Elevation</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="eyebrow">Elevation — borders do most of the work</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;">
    <div class="col">
      <div style="height:80px;background:var(--bg-1);border:1px solid var(--border);border-radius:12px;"></div>
      <div class="label-mono" style="color:var(--fg-1)">flat / hairline</div>
      <div class="label-mono">cards, sections</div>
    </div>
    <div class="col">
      <div style="height:80px;background:var(--bg-1);border:1px solid var(--border-strong);border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,0.4),0 1px 0 rgba(255,255,255,0.04) inset;"></div>
      <div class="label-mono" style="color:var(--fg-1)">shadow-1</div>
      <div class="label-mono">overlays, popovers</div>
    </div>
    <div class="col">
      <div style="height:80px;background:var(--bg-1);border:1px solid var(--accent);border-radius:12px;box-shadow:0 0 24px rgba(124,92,255,0.3);"></div>
      <div class="label-mono" style="color:var(--fg-1)">shadow-glow</div>
      <div class="label-mono">focused / featured</div>
    </div>
  </div>
</div></body></html>
