<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Color · Semantic</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="eyebrow">Color · Semantic & status</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">
    <div class="col">
      <div style="height:64px;border-radius:8px;background:var(--success);"></div>
      <div class="label-mono" style="color:var(--fg-1)">success</div>
      <div class="label-mono">#3FD18D</div>
      <div class="label-mono">clinical-validated, shipped</div>
    </div>
    <div class="col">
      <div style="height:64px;border-radius:8px;background:var(--warn);"></div>
      <div class="label-mono" style="color:var(--fg-1)">warn</div>
      <div class="label-mono">#FFB454</div>
      <div class="label-mono">in progress, draft</div>
    </div>
    <div class="col">
      <div style="height:64px;border-radius:8px;background:var(--danger);"></div>
      <div class="label-mono" style="color:var(--fg-1)">danger</div>
      <div class="label-mono">#FF5C5C</div>
      <div class="label-mono">destructive (rare)</div>
    </div>
  </div>
</div></body></html>
