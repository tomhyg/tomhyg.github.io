<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Color · Imagery</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="eyebrow">Imagery accents — tied to project artwork, never UI fills</div>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;">
    <div class="col">
      <div style="height:64px;border-radius:8px;background:var(--img-coral);"></div>
      <div class="label-mono" style="color:var(--fg-1)">coral</div>
      <div class="label-mono">portrait</div>
    </div>
    <div class="col">
      <div style="height:64px;border-radius:8px;background:var(--img-cyan);"></div>
      <div class="label-mono" style="color:var(--fg-1)">cyan</div>
      <div class="label-mono">PULSAR</div>
    </div>
    <div class="col">
      <div style="height:64px;border-radius:8px;background:var(--img-teal);"></div>
      <div class="label-mono" style="color:var(--fg-1)">teal</div>
      <div class="label-mono">Biquettes</div>
    </div>
    <div class="col">
      <div style="height:64px;border-radius:8px;background:var(--img-violet);"></div>
      <div class="label-mono" style="color:var(--fg-1)">violet</div>
      <div class="label-mono">Brooklyn</div>
    </div>
    <div class="col">
      <div style="height:64px;border-radius:8px;background:var(--img-amber);"></div>
      <div class="label-mono" style="color:var(--fg-1)">amber</div>
      <div class="label-mono">BABYCAM, Sleep</div>
    </div>
  </div>
</div></body></html>
